name: Tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::testthat
            any::torch
          needs: |
            test
          cache: true

      - name: Cache torch binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch
            ~/.local/share/torch
          key: ${{ runner.os }}-torch-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            ${{ runner.os }}-torch-

      - name: Install torch (lantern)
        run: |
          Rscript -e 'torch::install_torch()'

      - name: Run unit tests
        run: |
          Rscript -e 'reporter <- testthat::SummaryReporter$new(); testthat::test_local(reporter = reporter); failed <- reporter$failures$size(); if (failed > 0) quit(status = 1)'
