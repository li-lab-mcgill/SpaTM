name: Install

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::torch
          needs: |
            install
          cache: true

      - name: Build and install
        run: |
          R CMD build .
          R CMD INSTALL SpaTM_*.tar.gz
